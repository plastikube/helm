apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pk-crd-job-role
  labels:
  {{- include "crds.labels" . | nindent 4 }}
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
  - deletecollection
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pk-crd-job-cluster-role
  labels:
  {{- include "crds.labels" . | nindent 4 }}
rules:
- apiGroups:
  - apiextensions.k8s.io
  resourceNames: []
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
  - deletecollection
---
{{ if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "crds.serviceAccountName" . }}
  labels:
  {{- include "crds.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pk-crd-job-rolebinding
  labels:
  {{- include "crds.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pk-crd-job-role
subjects:
- kind: ServiceAccount
  name: '{{ include "crds.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pk-crd-job-cluster-rolebinding
  labels:
  {{- include "crds.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pk-crd-job-cluster-role
subjects:
- kind: ServiceAccount
  name: '{{ include "crds.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pk-crd-job
  labels:
    plastikube.dev/crds: "true"
  {{- include "crds.labels" . | nindent 4 }}
spec:
  selector: {}
  template:
    metadata:
      labels:
        plastikube.dev/crds: "true"
    spec:
      automountServiceAccountToken: true
      containers:
      - env:
        - name: KUBE_IN_CLUSTER_CONFIG
          value: {{ quote .Values.pkCrdJob.main.env.kubeInClusterConfig }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.pkCrdJob.main.image.repository }}:{{ .Values.pkCrdJob.main.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.pkCrdJob.main.imagePullPolicy }}
        name: main
        resources: {{- toYaml .Values.pkCrdJob.main.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.pkCrdJob.main.containerSecurityContext
          | nindent 10 }}
      dnsPolicy: ClusterFirst
      nodeSelector: {{- toYaml .Values.pkCrdJob.nodeSelector | nindent 8 }}
      restartPolicy: Never
      securityContext: {{- toYaml .Values.pkCrdJob.podSecurityContext | nindent 8
        }}
      serviceAccountName: {{ include "crds.serviceAccountName" . }}
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      tolerations: {{- toYaml .Values.pkCrdJob.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.pkCrdJob.topologySpreadConstraints
        | nindent 8 }}
  ttlSecondsAfterFinished: 600
